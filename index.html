<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Trabajo y Energía | Entorno Didáctico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']],
                packages: {'[+]': ['ams', 'configmacros']}
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
                positionMathtex: false
            },
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    MathJax.startup.promise.then(() => {
                        // Apply custom styling to all MathJax containers
                        const style = document.createElement('style');
                        style.textContent = `
                            .MathJax { color: #1D2333 !important; }
                            .MathJax:focus { outline: none; }
                            mjx-container {
                                display: block !important;
                                color: #1D2333 !important;
                            }
                            mjx-container[display="true"] {
                                display: block !important;
                                text-align: center !important;
                            }
                            /* Multi-line \\begin{aligned} equations inside step-formula cards */
                            .step-formula mjx-container {
                                font-size: 1.16rem !important;
                                line-height: 2.05 !important;
                                margin: 0 !important;
                                padding: 0 !important;
                            }
                            .step-formula mjx-container[display="true"] {
                                margin: 2px auto !important;
                                padding: 0 !important;
                            }
                        `;
                        document.head.appendChild(style);
                    });
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <main class="dashboard">
        <header class="header">
            <div class="header-titles">
                <div class="logo-badge" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
                </div>
                <div class="header-text">
                    <h1>Laboratorio de Trabajo y Energía</h1>
                    <p class="subtitle">Simulador Educativo · Principio de Conservación y Fuerzas No Conservativas</p>
                </div>
            </div>
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab-btn active" id="btn-tab-1" onclick="app.setScenario(1)">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="9" width="8" height="7"></rect><path d="M2 18h20"></path></svg>
                        1. Superficie Horizontal
                    </button>
                    <button class="tab-btn" id="btn-tab-2" onclick="app.setScenario(2)">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20h18"></path><path d="M3 20L14 5l3 4 4 11"></path></svg>
                        2. Plano Inclinado
                    </button>
                </div>
            </div>
        </header>

        <section class="grid-layout">
            <div class="side-column">
                <aside class="panel controls-panel">
                    <div class="panel-header">
                        <div class="panel-header-title">
                            <span class="panel-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h6"></path><circle cx="18" cy="12" r="2"></circle><circle cx="8" cy="18" r="2"></circle></svg>
                            </span>
                            <h2>Variables de Entrada</h2>
                        </div>
                        <span class="panel-header-tag">Live</span>
                    </div>
                    <div id="sliders-container" class="sliders-wrapper">
                    </div>
                    <div class="actions" id="action-buttons">
                    </div>
                </aside>
            </div>

            <section class="main-simulation-area">
                <div id="hud-superior" class="telemetria-superior">
                </div>

                <div class="canvas-wrapper panel" id="canvas-wrapper">
                    <div class="sim-toolbar">
                        <div class="sim-toolbar-left">
                            <span class="sim-status-pill">
                                <span class="sim-status-dot-live"></span>
                                <span class="sim-toolbar-label" id="sim-mode-label">Vista : Superficie Horizontal</span>
                            </span>
                        </div>
                        <div class="sim-toolbar-right">
                            <span class="vista-tag">Vista</span>
                            <div class="segmented" id="view-segmented">
                                <button type="button" class="active" id="btn-view-3d" onclick="app.setViewMode('3d')" data-tooltip="Vista isométrica">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="M3.27 6.96L12 12.01l8.73-5.05"></path><path d="M12 22.08V12"></path></svg>
                                    3D
                                </button>
                                <button type="button" id="btn-view-2d" onclick="app.setViewMode('2d')" data-tooltip="Vista frontal">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"></rect></svg>
                                    2D
                                </button>
                            </div>
                            <div class="toolbar-divider" aria-hidden="true"></div>
                            <button class="icon-btn" id="btn-grid" type="button" data-tooltip="Cuadrícula" aria-label="Cuadrícula" onclick="app.toggleGrid()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M3 9h18"></path><path d="M3 15h18"></path><path d="M9 3v18"></path><path d="M15 3v18"></path></svg>
                            </button>
                            <button class="icon-btn active" id="btn-measure" type="button" data-tooltip="Medición" aria-label="Medición" onclick="app.toggleMeasure()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"></path><path d="M6 8v4"></path><path d="M10 8v4"></path><path d="M14 8v4"></path><path d="M18 8v4"></path></svg>
                            </button>
                            <button class="icon-btn" id="btn-reset-camera" type="button" data-tooltip="Reiniciar Cámara" aria-label="Reiniciar Cámara" onclick="app.resetCamera()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v5h5"></path></svg>
                            </button>
                            <div class="toolbar-divider" aria-hidden="true"></div>
                            <button class="icon-btn icon-btn-accent" id="btn-fullscreen" type="button" data-tooltip="Pantalla completa" aria-label="Pantalla completa">
                                <svg class="fs-ico-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M21 16v3a2 2 0 0 1-2 2h-3"></path><path d="M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                                <svg class="fs-ico-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"></path><path d="M21 8h-3a2 2 0 0 1-2-2V3"></path><path d="M3 16h3a2 2 0 0 1 2 2v3"></path><path d="M16 21v-3a2 2 0 0 1 2-2h3"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="stage-holder">
                        <div class="stage-glow" aria-hidden="true"></div>
                        <div class="stage-grid-overlay" aria-hidden="true"></div>
                        <canvas id="simCanvas" width="1100" height="380"></canvas>
                        <div class="stage-corner-badge" aria-hidden="true">
                            <span class="stage-corner-dot"></span>
                            <span>STAGE · 1:1</span>
                        </div>
                    </div>
                </div>

                <aside class="panel math-panel">
                    <div class="panel-header">
                        <div class="panel-header-title">
                            <span class="panel-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"></rect><path d="M8 6h8"></path><path d="M8 11h.01M12 11h.01M16 11h.01M8 15h.01M12 15h.01M16 15h.01M8 19h.01M12 19h.01"></path></svg>
                            </span>
                            <h2>Demostración Analítica (MathJax LaTeX)</h2>
                        </div>
                        <span class="panel-header-tag tag-primary">TeX</span>
                    </div>
                    <div id="math-render" class="latex-container">
                        Calculando ecuaciones físicas del sistema...
                    </div>
                </aside>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
